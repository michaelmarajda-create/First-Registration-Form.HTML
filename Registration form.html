<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>
<body>
    <h1>Registration Form</h1>

    <form>
        <div>
            <label for = "first_name" >First Name: *</label>
            <input type="text" id="first_name" name="first_name">
            <br></br/>
            <label for = "last_name" >Last Name: *</label>
            <input type="text" id="last_name" name="last_name">
            <br></br/>
            <label for = "email" >Email Address: *</label>
            <input type="text" id="email" name="email">
            <br></br/>
            <label for = "password" >Password: *</label>
            <input type="password" id="password" name="password">
            <br></br/>  
            <label for = "confirm_password" >Confirm Password: *</label>
            <input type="password" id="confirm_password" name="confirm_password">
            <br></br/>
            <label for = "birthday" >Birthday:</label>
            <input type="date" id="birthday" name="birthday">
            <br></br/>
            <label for = "gender" >Gender Identity:</label>
            <input type="radio" id="male" name="gender" value="male">
            <br></br/>
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <br></br/>
            <label for="female">Female</label>
            <input type="radio" id="non_binary" name="gender" value="non_binary">
            <br></br/>
            <label for="non_binary">Non-binary</label>
            <input type="radio" id="prefer_not_to_answer" name="gender" value="prefer_not_to_answer">
            <label for="prefer_not_to_answer">I prefer not to answer</label>
        </div>
        <br></br/>
        <div>
            <label>A short description about myself:</label>
            
            <textarea rows="4" cols="35"></textarea>
        </div>   
        <br></br/>    
        <div>   
            <label>Favorite Language:</label>
                <select>
                    <option>JavaScript</option>
                    <option>Python</option>
                    <option>Java</option>
                    <option>C++</option>
                </select>
        </div>    
        <br></br/>
        <div>
            <input type="checkbox">
            <label>Yes, I would like to receive periodic email updates</label>
        </div>    
        <br></br/>
        <div>
            <input type="submit" value="Create Account">
        </div>
        <br></br/>
        <p>* Indicates a required field</p>

    </form>

</body>
</html>
